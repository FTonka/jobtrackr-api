name: JobTrackr CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────
  # JOB 1: .NET Build & Test
  # ─────────────────────────────────────
  build-and-test:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore JobTrackr.API/JobTrackr.API.csproj

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        continue-on-error: true  # Test projesi henüz yok, skip et

  # ─────────────────────────────────────
  # JOB 2: Python Scraper Test
  # ─────────────────────────────────────
  test-scraper:
    name: Test Python Scraper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ./JobTrackr.Scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: ./JobTrackr.Scraper
        run: |
          pip install flake8
          flake8 . --count --max-line-length=120 --statistics --exclude=venv
        continue-on-error: true

      - name: Test scraper import
        working-directory: ./JobTrackr.Scraper
        run: |
          python -c "from scrapers.kariyer_scraper import KariyerScraper; print('Scraper import OK')"

  # ─────────────────────────────────────
  # JOB 3: Docker Build
  # ─────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-and-test, test-scraper]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./JobTrackr.API/Dockerfile
          push: false
          tags: jobtrackr-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Scraper Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./JobTrackr.Scraper
          file: ./JobTrackr.Scraper/Dockerfile
          push: false
          tags: jobtrackr-scraper:latest

  # ─────────────────────────────────────
  # JOB 4: Deploy (sadece main branch)
  # ─────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          package: .
        continue-on-error: true  # Azure henüz kurulmadı, bir sonraki adımda

      - name: Deployment complete
        run: echo "Deploy job ran. Azure setup comes next step."